<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B0907">
  <link rel="icon" href="favicon.ico" sizes="16x16 32x32" type="image/x-icon">
  <meta name="description" content="Dan — builder, independent thinker.">
  <title>Dan.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200..400;1,9..144,200..400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav" data-animate data-delay="5">
    <a href="/" class="nav-logo">Dan</a>
    <div class="nav-right">
      <span id="nav-time" class="nav-time"></span>
      <a href="mailto:dan@craftbydan.com" class="nav-cta">Get in touch</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-inner">
      <h1 class="hero-name">Dan</h1>
      <div class="hero-meta" data-animate data-delay="7">
        <span>13°44'38"N 100°32'29"E</span>
        <span>UTC+7</span>
        <span>Reading: Hyperfocus</span>
      </div>
    </div>
  </section>

  <!-- Personal line -->
  <section class="personal">
    <div class="container">
      <p class="personal-line" data-scroll-animate>
        I build things before I know how.
      </p>
    </div>
  </section>

  <!-- About -->
  <section class="about">
    <div class="container">
      <p class="about-text" data-scroll-animate>
        Based in Bangkok.<br>
        Building things.<br>
        Right now that's whatsfor.today.
      </p>
    </div>
  </section>

  <!-- Now -->
  <section class="work">
    <div class="container">
      <span class="section-label" data-scroll-animate>Now</span>
      <ul class="work-list">
        <li class="work-item" data-scroll-animate>
          <a href="https://whatsfor.today" class="work-link" target="_blank" rel="noopener">
            <div class="work-row">
              <span class="work-name">whatsfor.today</span>
              <span class="work-arrow">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2 9 L9 2 M9 2 L9 5.5 M9 2 L5.5 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </div>
            <p class="work-desc">Building and fixing, live</p>
          </a>
        </li>
      </ul>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <a href="mailto:dan@craftbydan.com" class="footer-email">dan@craftbydan.com</a>
        <div class="footer-links">
          <a href="https://github.com/craftbydan" class="footer-link" target="_blank" rel="noopener">GitHub</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
